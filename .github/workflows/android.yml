name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'android-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Install Gradle
        run: |
          sdk install gradle 8.4 || (
            curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt/
            echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH
          )
      
      - name: Build APK
        working-directory: android-app
        run: |
          gradle --version
          gradle assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-morpher-android
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-v1.0.1
          release_name: Mobile-Morpher Android App v1.0.1
          files: android-app/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}