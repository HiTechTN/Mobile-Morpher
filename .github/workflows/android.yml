name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'android-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Create project structure
        working-directory: android-app
        run: |
          # Create minimal settings.gradle
          echo 'rootProject.name = "MobileMorpher"' > settings.gradle
          # Download Gradle wrapper
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.2/bin/gradle -p android-app wrapper --gradle-version 8.2

      - name: Build APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-morpher-android
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-app
          release_name: Mobile-Morpher Android App
          files: android-app/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}