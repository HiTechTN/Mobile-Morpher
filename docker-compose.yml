services:
  api-service:
    build: ./api-service
    container_name: mobile-morpher-api
    ports:
      - "9000:8000"
    volumes:
      - ./shared-volume:/app/shared-volume
      - ./api-service:/app
    environment:
      - PYTHONUNBUFFERED=1
      - WORK_DIR=/app/shared-volume
    restart: unless-stopped

  web-ui:
    build: ./web-ui
    container_name: mobile-morpher-web
    network_mode: "host"
    environment:
      - PORT=9001
    depends_on:
      - api-service
    restart: unless-stopped